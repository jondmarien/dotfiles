      location: "Mississauga, ON"
      units: "metric"
      callbacks:
        on_left: "toggle_card"
      icons:
        sunnyDay: "\udb81\udd99"
        clearNight: "\ue3c2"
        cloudyDay: "\ue21d"
        cloudyNight: "\ue226"
        rainyDay: "\ue371"
        rainyNight: "\ue371"
        snowyDay: "\udb81\udf17"
        snowyNight: "\udb81\udf17"
        blizzardDay: "\udb81\udd99"
        blizzardNight: "\udb81\udd99"
        foggyDay: "\ue303"
        foggyNight: "\ue346"
        thunderstormDay: "\ue30f"
        thunderstormNight: "\ue338"
        default: "\udb81\udd99"
      weather_card:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "#7e8f85"
        alignment: "right"
        direction: "down"
        icon_size: 48
        # NEW v1.8.5: Hourly forecast options
        show_hourly_forecast: true
        time_format: "12h"  # "12h" or "24h"
        hourly_point_spacing: 76
        hourly_icon_size: 32
        icon_smoothing: true
        temp_line_width: 2
        current_line_color: "#8EAEE8"
        current_line_width: 1
        current_line_style: "dot"  # "solid", "dash", "dot"
        # NEW v1.8.6: Weather animation effects for hourly widget
        hourly_gradient:
          enabled: true
          top_color: "#8EAEE8"
          bottom_color: "#2A3E68"
        weather_animation:
          enabled: true
          snow_overrides_rain: true
          temp_line_animation_style: "both"  # "rain", "snow", "both", or "none"
          rain_effect_intensity: 1.0  # 0.01 - 10.0
          snow_effect_intensity: 1.0  # 0.01 - 10.0
          scale_with_chance: true
          enable_debug: false
  open_meteo:
    type: "yasb.open_meteo.OpenMeteoWidget"
    options:
      label: "<span>{icon}</span> {temp}"
      label_alt: "{location}: Min {min_temp}, Max {max_temp}, Humidity {humidity}, Wind {wind}"
      tooltip: true
      update_interval: 600
      hide_decimal: true
      units: "metric"
      callbacks:
        on_left: "toggle_card"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      icons:
        sunnyDay: "\udb81\udd99"
        clearNight: "\ue3c2"
        cloudyDay: "\ue21d"
