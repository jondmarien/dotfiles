          token: ""
        hacker_news:
          enabled: true
          prefix: "hn"
          priority: 10
          cache_ttl: 300
          max_items: 30
        ip_info:
          enabled: true
          prefix: "ip"
          priority: 11
        kill_process:
          enabled: true
          prefix: "!"
          priority: 12
        port_viewer:
          enabled: true
          prefix: "pv"
          priority: 13
          tcp_listening_only: true
          include_established: false
        settings:
          enabled: true
          prefix: "@"
          priority: 14
        snippets:
          enabled: true
          prefix: ";"
          priority: 15
          type_delay: 200
        ssh:
          enabled: true
          prefix: "ssh"
          priority: 16
          ssh_config_path: "~/.ssh/config"
        system_commands:
          enabled: true
          prefix: ">"
          priority: 17
        unit_converter:
          enabled: true
          prefix: "~"
          priority: 18
        vscode:
          enabled: true
          prefix: "vsc"
          priority: 19
        web_search:
          enabled: true
          prefix: "?"
          priority: 20
          engine: "google"
        window_switcher:
          enabled: true
          prefix: "win"
          priority: 21
        windows_terminal:
          enabled: true
          prefix: "wt"
          priority: 22
        world_clock:
          enabled: true
          prefix: "tz"
          priority: 23
        wsl:
          enabled: true
          prefix: "wsl"
          priority: 24
          show_online: true
      popup:
        width: 720
        height: 480
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        dark_mode: true
      callbacks:
        on_left: "toggle_quick_launch"
      keybindings:
        - keys: "ctrl+space"
          action: "toggle_quick_launch"
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "<span>\uf017</span> {%I:%M:%S %p}"
      label_alt: "<span>\uf017</span> {%d-%m-%y %I:%M:%S %p}"
      locale: ""
      update_interval: 1000
      timezones: []
      calendar:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "System"
        alignment: "center"
        direction: "down"
        # NEW v1.8.7: Display year in calendar popup
        show_years: true
      callbacks:
        on_left: "toggle_calendar"
        on_middle: "toggle_label"
        on_right: "next_timezone"
  # Legacy WeatherWidget backup (pre-1.9.0). Kept for easy rollback.
  weather_legacy:
    type: "yasb.weather.WeatherWidget"
    options:
      # NEW v1.8.5: Added {chance_of_rain} and {chance_of_snow} placeholders
      label: "<span>{icon}</span> {conditions} {temp}"
      label_alt: "{location}: {conditions}, Min {min_temp}, Max {max_temp}, Humidity {humidity}, Rain {chance_of_rain}%, Snow {chance_of_snow}%"
      api_key: '53c6b436eaa649beadb50948252306'
      update_interval: 600 #Update interval in seconds, Min 600
