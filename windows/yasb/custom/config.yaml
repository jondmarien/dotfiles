watch_stylesheet: true
watch_config: true
debug: false
update_check: true
komorebi:
  start_command: "komorebic start"
  stop_command: "komorebic stop"
  reload_command: "komorebic stop && komorebic start"
glazewm:
  start_command: "glazewm.exe start"
  stop_command: "glazewm.exe command wm-exit"
  reload_command: "glazewm.exe command wm-exit && glazewm.exe start"
bars:
  status-bar:
    enabled: true
    screens: ['*']
    class_name: "yasb-bar"
    alignment:
      position: "top"
    animation:
      enabled: true
      duration: 800
    blur_effect:
      enabled: true
      dark_mode: true
      round_corners: true
      border_color: "none"
    window_flags:
      always_on_top: false
      windows_app_bar: true
      # NEW v1.8.8: Auto-hide bar when a window is maximized (only works when windows_app_bar is false)
      hide_on_maximized: false
    dimensions:
      width: "100%"
      height: 35
    padding:
      top: 12
      left: 11
      bottom: 4
      right: 11
    widgets:
      left:
        [
          "home",
          "bin",
          "update_check",
          "wm_controls",
          "launchpad",
        ]
      center:
        [
          "quick_launch",
          "github",
          "notes",
          "clock",
          "open_meteo",
          "wallpapers"
        ]
      right:
        [
          "taskbar",
          "cpu",
          "memory",
          "gpu",
          "traffic",
          "system_monitor",
          "language",
          "disk",
          "power_menu"
        ]

widgets:
  # Grouper Widgets
  wm_controls:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "wm-controls"
      hide_empty: false
      widgets: ["glazewm_workspaces"]
      collapse_options:
        enabled: false  # Set to true to enable collapse functionality
        exclude_widgets: []  # Widgets that stay visible when collapsed
        expanded_label: "\uf054"  # Icon when expanded
        collapsed_label: "\uf053"  # Icon when collapsed
        label_position: "right"  # "left" or "right"
  system_monitor:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "system-monitor"
      hide_empty: false
      widgets: ["media", "bluetooth"]
      collapse_options:
        enabled: true  # Enable collapse for system monitor
        exclude_widgets: []  # All widgets can be collapsed
        expanded_label: "\uf054"  # Icon when expanded
        collapsed_label: "\uf053"  # Icon when collapsed
        label_position: "right"  # "left" or "right"
  # Individual Widgets
  home:
    type: "yasb.home.HomeWidget"
    options:
      label: "Chrono's PC"
      menu_list:
        - { title: "🏠 Home", path: "~" }
        - { title: "📥 Downloads", path: "C:\\Users\\nucle\\Downloads"}
        - { title: "📄 Documents", path: "C:\\Users\\nucle\\Documents"}
        - { title: "🖼️ Pictures", path: "C:\\Users\\nucle\\Pictures"}
        - { title: "🎬 Videos", path: "C:\\Users\\nucle\\Videos"}
        - { title: "🎮 Games", path: "C:\\Users\\nucle\\Desktop\\Desktop Apps\\Games"}
        - { title: "🎵 Spotify", path: "C:\\Users\\nucle\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Spotify.lnk"}
        - { title: "📺 Stremio", path: "C:\\Users\\nucle\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Stremio.lnk"}
        - { title: "🎯 Steam", path: "C:\\ProgramData\\Microsoft\\Windows\\Start Menu\\Programs\\Steam\\Steam.lnk"}
        - { title: "🌐 Zen Browser", path: "C:\\Users\\nucle\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Zen.lnk"}
        - { title: "⚙️ iCUE", path: "C:\\ProgramData\\Microsoft\\Windows\\Start Menu\\Corsair\\iCUE.lnk"}
      system_menu: true
      power_menu: false
      blur: true
      round_corners: true
      round_corners_type: "normal"
      border_color: "System"
  bin:
    type: "yasb.recycle_bin.RecycleBinWidget"
    options:
      label: "<span>{icon}</span>({items_size})"
      icons:
        bin_empty: "\udb82\ude7a"
        bin_filled: "\udb82\ude79"
      # NEW v1.8.7: Show Windows confirmation dialog before emptying
      show_confirmation: true
      callbacks:
        on_left: "open_bin"
        on_right: "toggle_label"
        on_middle: "empty_bin"
  update_check:
    type: "yasb.update_check.UpdateCheckWidget"
    options:
      windows_update:
        enabled: true
        label: "<span>\uf0ab</span> {count}"
        interval: 240
        exclude: []
      winget_update:
        enabled: true  # Must be enabled due to YASB bug - setting to false crashes widget
        label: "<span>\uf0ab</span> {count}"
        interval: 60
        exclude: []
  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: ""
      label_workspace_btn: "{name}"
      label_workspace_active_btn: "{name}"
      label_workspace_populated_btn: "{name}"
      label_default_name: ""
      label_zero_index: false
      hide_if_offline: false
      toggle_workspace_layer:
        enabled: false
        tiling_label: "Tiling"
        floating_label: "Floating"
      app_icons:
        enabled_populated: true
        enabled_active: true
        size: 12
        max_icons: 0
        hide_label: false
        hide_duplicates: false
        hide_floating: false
  komorebi_control:
    type: "komorebi.control.KomorebiControlWidget"
    options:
      label: "<span>\udb80\uddd9</span>"
      icons:
        start: "\uead3"
        stop: "\uead7"
        reload: "\uead2"
      run_ahk: false
      run_whkd: true
      # NEW v1.8.6: Option to run Masir
      run_masir: false
      show_version: true
      komorebi_menu:
        blur: true
        round_corners: true
        round_corners_type: 'normal'
        border_color: 'System'
        alignment: 'left'
        direction: 'down'
        offset_top: 6
        offset_left: 0
  komorebi_stack:
    type: "komorebi.stack.StackWidget"
    options:
      label_offline: ""
      label_window: "{process}"
      label_window_active: "{title}"
      label_no_window: "No Window"
      label_zero_index: false
      show_icons: "always"
      icon_size: 14
      max_length: 10
      max_length_active: 20
      max_length_ellipsis: ".."
      hide_if_offline: false
      show_only_stack: false
      enable_scroll_switching : true
  glazewm_restore:
    type: "yasb.custom.CustomWidget"
    options:
      label: "<span>\uf021</span>"
      label_alt: "Fix GlazeWM"
      class_name: "glazewm-restore-widget"
      exec_options:
        run_cmd: "powershell.exe -ExecutionPolicy Bypass -File \"c:\\Users\\nucle\\.glzr\\glazewm\\glazewm-workspace-restore.ps1\""
        run_interval: 0
        return_format: "string"
        hide_empty: true
        use_shell: false
      # NEW v1.8.5: Tooltip support for custom widgets
      tooltip:
        enabled: false
        tooltip_label: "GlazeWM Restore - Click to fix workspace state"  # Can use {data} placeholders like: "{data[key]}"
        tooltip_delay: 400  # Delay in ms before tooltip appears
      callbacks:
        on_left: "exec"
        on_middle: "toggle_label"
        on_right: "toggle_label"
  glazewm_workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      offline_label: "GlazeWM Offline"
      monitor_exclusive: true  # v1.9.0+ preferred workspace filtering mode
      # Kept for backward compatibility; newer versions prefer monitor_exclusive
      hide_if_offline: false
      # Label customization (uses {name} or {display_name} from GlazeWM config)
      # populated_label: "{name}"        # Non-active workspace with windows
      # empty_label: "{name}"            # Non-active workspace without windows
      # active_populated_label: "{name}" # Active workspace with windows
      # active_empty_label: "{name}"     # Active workspace without windows
      # NEW v1.8.5: Focused workspace distinction (multi-monitor)
      focused_populated_label: "WS: {name}"  # Focused workspace with windows
      focused_empty_label: "Empty: {name}"   # Focused workspace without windows
      # Scroll to switch workspaces
      enable_scroll_switching: true
      reverse_scroll_direction: false
      # App icons in workspace buttons
      app_icons:
        enabled_populated: false  # Show icons in populated workspaces
        enabled_active: true      # Show icons in active workspace
        enabled_focused: true     # Show icons in focused workspace (v1.8.5)
        size: 14
        max_icons: 4              # 0 = unlimited
        hide_label: false         # Hide workspace name when icons shown
        hide_duplicates: true     # Hide duplicate app icons
        hide_floating: false      # Hide floating window icons
      # Styling
  windsurf:
    type: "yasb.vscode.VSCodeWidget"
    options:
      label: "<span>\uef16</span>"  # Windsurf icon
      label_alt: "<span>\uef16</span> recents"
      menu_title: "Windsurf Next recents"
      max_field_size: 50
      folder_icon: "\uf114"
      file_icon: "\uf016"
      truncate_to_root_dir: true
      hide_folder_icon: false
      hide_file_icon: false
      max_number_of_folders: 20
      max_number_of_files: 10
      modified_date_format: "%m/%d/%y %H:%M"
      cli_command: "windsurf-next"
      # Path to Windsurf Next state database
      state_storage_path: "C:\\Users\\nucle\\AppData\\Roaming\\Windsurf - Next\\User\\globalStorage\\state.vscdb"
      menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "#798985"
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"
  ai_chat:
    type: "yasb.ai_chat.AiChatWidget"
    options:
      label: "<span>\uf086</span>"
      chat:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "center"
        direction: "down"
        offset_left: 0
        offset_top: 6
      icons:
        send: "\uf1d8"
        stop: "\uf04d"
        clear: "\uf1f8"
        assistant: "\udb81\ude74"
        attach: "\uf0c6"
        # NEW v1.8.8: Floating window and copy icons
        float_on: "\udb84\udcac"
        float_off: "\udb84\udca9"
        close: "\uf00d"
        copy: "\uebcc"
        copy_check: "\uf00c"
      notification_dot:
        enabled: false
        corner: "top_right"
        color: "red"
        margin: [0, 2]
      # NEW v1.8.8: Start chat in floating window mode
      start_floating: true
      callbacks:
        on_left: "toggle_chat"
        on_middle: "do_nothing"
        on_right: "do_nothing"
      providers:
        - provider: "OpenRouter"
          # NEW v1.8.8: provider_type can be "openai" or "copilot"
          provider_type: "openai"
          api_endpoint: "https://openrouter.ai/api/v1"
          credential: "env"
          models:
            - name: "perplexity/sonar"
              label: "Perplexity Sonar"
            - name: "perplexity/sonar-pro"
              label: "Perplexity Sonar Pro"
            - name: "anthropic/claude-3.5-sonnet"
              label: "Claude 3.5 Sonnet"
            - name: "openai/gpt-4o-mini"
              label: "GPT-4o Mini"
  # NEW v1.8.8: Window Controls Widget (minimize/maximize/close focused window)
  window_controls:
    type: "yasb.window_controls.WindowControlsWidget"
    options:
      show_app_name: true
      maximized_only: false
      buttons: ["minimize", "maximize", "close"]
      button_labels:
        minimize: "\uf2d1"
        maximize: "\uf2d0"
        restore: "\uf2d2"
        close: "\uf00d"
      monitor_exclusive: true
      animation_duration: 120

  obs:
    type: "yasb.obs.ObsWidget"
    options:
      connection:
        host: "192.168.2.38"
        port: 4455
        password: "M2zIK7OKeOsIpVes"
      icons:
        recording: "\ueba7"
        stopped: "\ueba5"
        paused: "\ueba7"
      hide_when_not_recording: true
      blinking_icon: true
      # NEW v1.8.8: Additional OBS display options
      show_record_time: true
      show_virtual_cam: true
      show_studio_mode: true
      tooltip: true
  github:
    type: "yasb.github.GithubWidget"
    options:
      label: "<span>\ueba1</span>"
      label_alt: "Notifications {data}"  # {data} returns number of unread notifications
      tooltip: true  # Show tooltip on hover
      # OAuth-first (v1.9.1+): keep token empty to use device-flow sign-in.
      # Optional fallback: set token: "env" and provide YASB_GITHUB_TOKEN.
      token: ""
      max_notification: 30  # Max 50
      only_unread: false
      max_field_size: 54
      update_interval: 300  # Check interval in seconds (min: 60, max: 3600)
      show_comment_count: true  # Fetch comment counts for issues/PRs (extra API call)
      reason_filters: []  # e.g., ['mention', 'assign', 'review_requested'] - empty = all
      notification_dot:
        enabled: true
        corner: "bottom_left"  # top_left, top_right, bottom_left, bottom_right
        color: "red"
        margin: [1, 1]
      # Icons for different notification types
      icons:
        issue: "\uf41b"
        issue_closed: "\uf41d"
        pull_request: "\uea64"
        pull_request_closed: "\uebda"
        pull_request_merged: "\uf17f"
        pull_request_draft: "\uebdb"
        release: "\uea84"
        discussion: "\uf442"
        discussion_answered: "\uf4c0"
        checksuite: "\uf418"
        default: "\uea84"
        github_logo: "\ueba1"
        comment: "\uf41f"
      menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_categories: true  # Group notifications by type (PullRequest, Issue, etc.)
        categories_order: ["PullRequest", "Issue", "CheckSuite", "Release", "Discussion"]
  # NEW v1.8.7: GitHub Copilot Usage Widget
  copilot:
    type: "yasb.copilot.CopilotWidget"
    options:
      label: "{icon} {used}/{allowance}"
      label_alt: "Copilot: {used}/{allowance} ({percentage}%)"
      # Token options:
      # 1. Set directly: token: "github_pat_xxxxxxxxxxxx"
      # 2. Use environment variable: token: "env" (reads YASB_COPILOT_TOKEN)
      # Get your token at: https://github.com/settings/tokens (Fine-grained personal access token)
      # Required permission: Account permissions -> Copilot (Read)
      token: "env"
      plan: "pro"  # "pro" or "pro_plus"
      update_interval: 120  # Check interval in seconds
      tooltip: true
      icons:
        copilot: "\udb81\ude74"
        error: "\uf071"
      thresholds:
        warning: 75
        critical: 90
      menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        chart: true
      callbacks:
        on_left: "toggle_label"
  # NEW v1.8.7: Brightness Widget (Monitor brightness control)
  brightness:
    type: "yasb.brightness.BrightnessWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "Brightness {percent}%"
      tooltip: true
      brightness_toggle_level: [0, 50, 100]
      brightness_icons:
        - "\udb80\udcde"  # Icon for 0-25% brightness
        - "\udb80\udcdd"  # Icon for 26-50% brightness
        - "\udb80\udcdf"  # Icon for 51-75% brightness
        - "\udb80\udce0"  # Icon for 76-100% brightness
      brightness_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
      callbacks:
        on_left: "toggle_label"
        on_middle: "do_nothing"
        on_right: "toggle_brightness_menu"
  # NEW v1.8.7: Language Widget
  language:
    type: "yasb.language.LanguageWidget"
    options:
      label: "{lang[language_code]}-{lang[country_code]}"
      label_alt: "{lang[full_name]}"
      update_interval: 5
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      language_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_layout_icon: true
        layout_icon: "\uf11c"
  quick_launch:
    type: "yasb.quick_launch.QuickLaunchWidget"
    options:
      label: "<span>\uf002</span>"
      search_placeholder: "Search apps, gh, ssh, wt, wsl..."
      max_results: 60
      show_icons: true
      icon_size: 32
      home_page: true
      compact_mode: false
      compact_text: false
      remember_last_query: true
      providers:
        apps:
          enabled: true
          prefix: "*"
          priority: 0
          show_recent: true
          max_recent: 8
          show_description: true
        bookmarks:
          enabled: true
          prefix: "*"
          priority: 1
          browser: "all"
          profile: "Default"
        calculator:
          enabled: true
          prefix: "="
          priority: 2
        clipboard_history:
          enabled: true
          prefix: "cb"
          priority: 3
          max_items: 30
          show_preview: true
        color:
          enabled: true
          prefix: "c:"
          priority: 4
        currency:
          enabled: true
          prefix: "$"
          priority: 5
        dev_tools:
          enabled: true
          prefix: "dev"
          priority: 6
        emoji:
          enabled: true
          prefix: ":"
          priority: 7
        file_search:
          enabled: true
          prefix: "/"
          priority: 8
          backend: "auto"
