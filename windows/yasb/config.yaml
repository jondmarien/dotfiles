        enabled: true
        color: "black"
        radius: 3
        offset: [1, 1]

  obs:
    type: "yasb.obs.ObsWidget"
    options:
      connection:
        host: "192.168.2.38"
        port: 4455
        password: "M2zIK7OKeOsIpVes"
      icons:
        recording: "\ueba7"
        stopped: "\ueba5"
        paused: "\ueba7"
      hide_when_not_recording: true
      blinking_icon: true
  github:
    type: "yasb.github.GithubWidget"
    options:
      label: "<span>\ueba1</span>"
      label_alt: "Notifications {data}"  # {data} returns number of unread notifications
      tooltip: true  # Show tooltip on hover
      # Token options:
      # 1. Set directly: token: "ghp_xxxxxxxxxxxx"
      # 2. Use environment variable: token: "env" (reads YASB_GITHUB_TOKEN)
      # Get your token at: https://github.com/settings/tokens (Personal access tokens - classic)
      # Required scope: "notifications" (read)
      token: "env"  # Set YASB_GITHUB_TOKEN environment variable, or replace with your token
      max_notification: 30  # Max 50
      only_unread: false
      max_field_size: 54
      update_interval: 300  # Check interval in seconds (min: 60, max: 3600)
      show_comment_count: true  # Fetch comment counts for issues/PRs (extra API call)
      reason_filters: []  # e.g., ['mention', 'assign', 'review_requested'] - empty = all
      notification_dot:
        enabled: true
        corner: "bottom_left"  # top_left, top_right, bottom_left, bottom_right
        color: "red"
        margin: [1, 1]
      # Icons for different notification types
      icons:
        issue: "\uf41b"
        issue_closed: "\uf41d"
        pull_request: "\uea64"
        pull_request_closed: "\uebda"
        pull_request_merged: "\uf17f"
        pull_request_draft: "\uebdb"
        release: "\uea84"
        discussion: "\uf442"
        discussion_answered: "\uf4c0"
        checksuite: "\uf418"
        default: "\uea84"
        github_logo: "\ueba1"
        comment: "\uf41f"
      menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_categories: true  # Group notifications by type (PullRequest, Issue, etc.)
        categories_order: ["PullRequest", "Issue", "CheckSuite", "Release", "Discussion"]
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [1, 1]
      animation:
        enabled: true
        duration: 500
        type: "fadeInOut"

  apps:
    type: "yasb.applications.ApplicationsWidget"
    options:
      label: "{data}"
      app_list:
        - { icon: "\uf489", launch: "warp" }    
        - { icon: "\uf1ff",launch: "C:\\Users\\nucle\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Discord Inc\\Discord.lnk" }
        - { icon: "\uef16",launch: "C:\\Users\\nucle\\AppData\\Local\\Programs\\Windsurf\\Windsurf.exe" }
        - { icon: "\udb82\udde8", launch: "C:\\Corsair iCUE5 Software\\iCUE.exe" }
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "<span>\uf017</span> {%I:%M:%S %p}"
      label_alt: "<span>\uf017</span> {%d-%m-%y %I:%M:%S %p}"
      locale: ""
      update_interval: 1000
      timezones: []
      calendar:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "System"
        alignment: "center"
        direction: "down"
      callbacks:
