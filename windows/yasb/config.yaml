        round_corners_type: "normal"
        border_color: "#7e8f85"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        thumbnail_corner_radius: 8
        thumbnail_size: 160
        max_title_size: 120
        max_artist_size: 120
        show_source: true
      media_menu_icons:
        prev_track: "⏮"
        play: "▶"
        pause: "⏸"
        next_track: "⏭"
      label_shadow:
        enabled: true
        color: "black"
        radius: 1
        offset: [ 1, 1 ]
      scrolling_label:
        enabled: false
        update_interval_ms: 50
        style: "left"
        separator: " | "
        label_padding: 1
        always_scroll: false
        
  # CPU, Memory, and Disk Widgets
  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "<span>\uf4bc</span> {info[percent][total]}%"
      label_alt: "<span>\uf437</span> {info[histograms][cpu_percent]}"
      update_interval: 2000
      histogram_icons:
        - "\u2581"  # 0%
        - "\u2581"  # 10%
        - "\u2582"  # 20%
        - "\u2583"  # 30%
        - "\u2584"  # 40%
        - "\u2585"  # 50%
        - "\u2586"  # 60%
        - "\u2587"  # 70%
        - "\u2588"  # 80%+
      histogram_num_columns: 8
      callbacks:
        on_right: "exec cmd /c Taskmgr"
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "<span>\uefc5</span> {virtual_mem_percent}%"
      label_alt: "<span>\uefc5</span> {virtual_mem_used}/{virtual_mem_total}"
      update_interval: 5000
      callbacks:
        on_left: "toggle_label"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  # traffic:
  #   type: "yasb.traffic.TrafficWidget"
  #   options:
  #     label: "<span>\udb82\udcfa</span>    \uea9a{download_speed} \ueaa1{upload_speed}"
  #     label_alt: "<span>\udb82\udcfa</span> Download {download_speed} | Upload {upload_speed}"
  #     update_interval: 1000
  #     callbacks:
  #       on_left: 'toggle_label'
  #       on_right: 'exec cmd /c Taskmgr'
  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      label_collapsed: "▼"
      label_expanded: "▶"
      label_position: "left" # Can be "left" or "right"
      icon_size: 12 # Can be any integer between 8 and 64
      pin_click_modifier: "alt" # Can be "ctrl", "alt" or "shift"
      show_unpinned: false
      show_unpinned_button: true
      show_battery: false
      show_volume: false
      show_network: false
      btn_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span> {level}"
      label_alt: "{volume}"
      volume_icons:
        - "\ueee8"  # Icon muted
        - "\uf026"  # Icon 0-25%
        - "\uf027"  # Icon 26-75%
        - "\uf028"  # Icon 76-100%
      callbacks:
        on_left: "toggle_volume_menu"  # NEW v1.8.4: Opens volume menu with app controls
        on_middle: "do_nothing"
        on_right: "toggle_mute"
      audio_menu:  # NEW v1.8.4: App volume control menu
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_apps: true  # NEW: Show individual app volume controls
        show_app_labels: false
        show_app_icons: true
        show_apps_expanded: false  # NEW: Auto-expand app volumes (false = collapsed by default)
        app_icons:
          toggle_down: "\uf078"  # Icon when collapsed
          toggle_up: "\uf077"    # Icon when expanded
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [1, 1]

  traffic:
    type: "yasb.traffic.TrafficWidget"
    options:
      label: "\ueab4 {download_speed} \ueab7 {upload_speed}"
      label_alt: "D: {download_speed} | U: {upload_speed}"
      update_interval: 1000
      menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_interface_name: true
        show_internet_info: true
      callbacks:
        on_left: "toggle_menu"
        on_right: "toggle_label"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [1, 1]

  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span>"
      label_alt: "{wifi_name} {wifi_strength}%"
      update_interval: 5000
      hide_if_ethernet: true  # Hide when using ethernet
      ethernet_label: "<span>{wifi_icon}</span>"
      ethernet_label_alt: "<span>{wifi_icon}</span> {ip_addr}"
      ethernet_icon: "\ueba9"
      get_exact_wifi_strength: false
      wifi_icons: [
        "\udb82\udd2e",
        "\udb82\udd1f",
        "\udb82\udd22",
        "\udb82\udd25",
        "\udb82\udd28"
      ]
      callbacks:
        on_left: "toggle_menu"
        on_middle: "exec cmd.exe /c start ms-settings:network"
        on_right: "toggle_label"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [1, 1]
      menu_config:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0

  bluetooth:
    type: "yasb.bluetooth.BluetoothWidget"
    options:
      label: "<span>{icon}</span> {device_count}"
      label_no_device: "No devices connected"
      label_device_separator: ", "
      max_length: 10
      max_length_ellipsis: "..."
      icons: 
        bluetooth_on: "\udb80\udcaf"
        bluetooth_off: "\udb80\udcb2"
        bluetooth_connected: "\udb80\udcb1"
      device_aliases:
        - name: "T5.0"
          alias: "\uf025"
      callbacks:
        on_left: "toggle_label"
        on_right: "exec cmd.exe /c start ms-settings:bluetooth"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  disk:
    type: "yasb.disk.DiskWidget"
    options:
        label: "<span>\uf473</span>"
        label_alt: "<span>\uf473</span>"
        group_label:
          volume_labels: ["C", "D", "E", "F", "H", "I", "J"]
          show_label_name: true 
          blur: True
          round_corners: True
          round_corners_type: "normal"
          border_color: "#7e8f85"
          alignment: "right"
          direction: "down"
          distance: 6
        callbacks:
          on_left: "toggle_group"
  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: "\u23fb"
      uptime: true
      blur: false
      blur_background: true
      animation_duration: 300
      button_row: 3
      buttons:
        lock: ["\uea75", "Lock"]
        sleep: ["\u23fe", "Sleep"]
        signout: ["\uea76", "Sign Out"]
        shutdown: ["\u23fb", "Shutdown"]
        restart: ["\uead2", "Restart"]
        hibernate: ["\ueaf7", "Hibernate"]
        cancel: ["\uea76", "Cancel"]
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [1, 1]

  gpu:
    type: "yasb.gpu.GpuWidget"
    options:
      label: "<span>\uf4bc</span> {info[utilization]}%"
      label_alt: "<span>\uf4bc</span> {info[temp]}°C | {info[mem_used]} / {info[mem_total]}"
      update_interval: 5000
      gpu_thresholds:
        low: 25
        medium: 50
        high: 90
      histogram_icons:
        - "\u2581"  # 0%
        - "\u2581"  # 10%
        - "\u2582"  # 20%
        - "\u2583"  # 30%
        - "\u2584"  # 40%
        - "\u2585"  # 50%
        - "\u2586"  # 60%
        - "\u2587"  # 70%
        - "\u2588"  # 80%+
      histogram_num_columns: 8
      callbacks:
        on_left: "toggle_label"
      animation:
        enabled: true
        type: "fadeInOut"
        duration: 200
      container_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
      progress_bar:
        enabled: true
        position: "right"
        size: 20
        thickness: 2
        color: "#57948a"
        background_color: "#23334e"
        animation: true