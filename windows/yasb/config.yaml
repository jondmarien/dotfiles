  weather:
    type: "yasb.weather.WeatherWidget"
    options:
      # NEW v1.8.5: Added {chance_of_rain} and {chance_of_snow} placeholders
      label: "<span>{icon}</span> {conditions} {temp}"
      label_alt: "{location}: {conditions}, Min {min_temp}, Max {max_temp}, Humidity {humidity}, Rain {chance_of_rain}%, Snow {chance_of_snow}%"
      api_key: '53c6b436eaa649beadb50948252306'
      update_interval: 600 #Update interval in seconds, Min 600
      hide_decimal: true
      location: "Mississauga, ON"
      units: "metric"
      callbacks:
        on_left: "toggle_card"
      icons:
        sunnyDay: "\udb81\udd99"
        clearNight: "\ue3c2"
        cloudyDay: "\ue21d"
        cloudyNight: "\ue226"
        rainyDay: "\ue371"
        rainyNight: "\ue371"
        snowyIcyDay: "\udb81\udf17"
        snowyIcyNight: "\udb81\udf17"
        blizzard: "\udb81\udd99"
        default: "\udb81\udd99"
      weather_card:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "#7e8f85"
        alignment: "right"
        direction: "down"
        distance: 6
        icon_size: 48
        # NEW v1.8.5: Hourly forecast options
        show_hourly_forecast: true
        time_format: "12h"  # "12h" or "24h"
        hourly_point_spacing: 76
        hourly_icon_size: 32
        icon_smoothing: true
        temp_line_width: 2
        current_line_color: "#8EAEE8"
        current_line_width: 1
        current_line_style: "dot"  # "solid", "dash", "dot"
        # NEW v1.8.6: Weather animation effects for hourly widget
        hourly_gradient:
          enabled: true
          top_color: "#8EAEE8"
          bottom_color: "#2A3E68"
        weather_animation:
          enabled: true
          snow_overrides_rain: true
          temp_line_animation_style: "both"  # "rain", "snow", "both", or "none"
          rain_effect_intensity: 1.0  # 0.01 - 10.0
          snow_effect_intensity: 1.0  # 0.01 - 10.0
          scale_with_chance: true
          enable_debug: false
  notes:
    type: "yasb.notes.NotesWidget"
    options:
      label: "<span>\udb82\udd0c</span> {count}"
      label_alt: "{count} notes"
      # NEW v1.8.5: Custom data path for notes storage (defaults to ~/.config/yasb/notes.json)
      data_path: "C:\\Users\\nucle\\.config\\yasb\\notes.json"
      menu:
