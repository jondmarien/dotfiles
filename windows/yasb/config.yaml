        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        max_title_size: 150
        show_date_time: true
      icons:
        note: "\udb82\udd0c"
        delete: "\ueab8"
        copy: "\uebcc"
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [1, 1]
      animation:
        enabled: true
        duration: 600
        type: "fadeInOut"
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span>\udb83\ude09</span>"
      # NEW v1.8.6: Support for multiple image folders (can be a single path or a list)
      image_path: "C:\\Users\\nucle\\Downloads\\wALLpapers"
      # image_path:  # Example of multiple folders
      #   - "C:\\Users\\nucle\\Downloads\\wALLpapers"
      #   - "C:\\Users\\nucle\\Pictures\\Wallpapers"
      change_automatically: false
      update_interval: 60
      gallery:
        enabled: true
        blur: true
        # NEW v1.8.6: gallery_columns option for grid layout
